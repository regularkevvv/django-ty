[baseline]
upstream_name = "django-stubs"
version = "6.0.6"
commit = "c1d968a356955f9598da6536115ccae4ed802b44"
repository = "https://github.com/typeddjango/django-stubs"
upstream_stub_root = "django-stubs"
vendored_stub_root = "python/django_ty/stubs/django"
expected_stub_files = 704
expected_public_symbols = 16569
expected_static_tree_sha256 = "ddd7f5058ccd5cad6590adf121b033a7809b68bcd83ca14103d7ff070423aba6"
expected_transformers = [
    "auth",
    "choices",
    "fields",
    "forms",
    "functional",
    "init_create",
    "managers",
    "manytomany",
    "manytoone",
    "meta",
    "models",
    "orm_lookups",
    "querysets",
    "request",
    "save",
    "settings",
]

[static_api]
description = "The complete pinned static API is vendored inside django-ty."

[scoring]
semantic_target_percent = 95

[conformance]
python = "3.13"
django = "6.0.7"
mypy = "2.1.0"
ty_extended = "0.59.0"
ty_extended_commit = "384acfd51695dc5eb9e8af8c166da961a1095a40"
django_ty = "0.1.1"
minimum_cases_per_feature = 2

[[feature]]
id = "static-api.distribution"
area = "Static Django API"
surface = "static"
upstream = ["django-stubs/**/*.pyi"]

[[feature]]
id = "models.subclass-transform"
area = "Models and fields"
surface = "dynamic"
upstream = ["mypy_django_plugin/transformers/models.py:process_model_class"]

